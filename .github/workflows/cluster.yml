name: News Clustering

on:
  # 2:00 AM Madison time (America/Chicago)
  # CST (winter) = UTC-6  → 08:00 UTC
  # CDT (summer) = UTC-5  → 07:00 UTC
  # GitHub Actions cron runs in UTC, so this is set for CST (winter).
  # Update to '0 7 * * *' in March when daylight saving kicks in.
  schedule:
    - cron: '0 8 * * *'
  # Also triggered programmatically by ingest.yml after successful ingestion
  workflow_dispatch:

jobs:
  cluster:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hour max (embedding + UMAP + clustering is heavy)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: cron/requirements.txt

      - name: Install dependencies
        run: |
          cd cron
          pip install -r requirements.txt

      - name: Run clustering script
        env:
          # ENV VARIABLE MUSH — set these in GitHub repo Settings → Secrets → Actions
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # ENV VARIABLE MUSH — get your free key at console.groq.com
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd cron
          python news_clustering.py