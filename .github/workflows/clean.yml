name: Data Cleaning

on:
  # Triggered programmatically by ingest.yml after successful ingestion
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Cleaning is just SQL queries, should finish in under a minute

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: cron/requirements.txt

      - name: Install dependencies
        run: |
          cd cron
          pip install -r requirements.txt

      - name: Run cleaning script
        env:
          # ENV VARIABLE MUSH — set in GitHub repo Settings → Secrets → Actions
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd cron
          python data_cleaner.py

      - name: Trigger clustering workflow
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cluster.yml',
              ref: 'main'
            });