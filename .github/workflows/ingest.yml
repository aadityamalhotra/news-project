name: Daily News Ingestion

on:
  # 12:10 AM Madison time (America/Chicago)
  # CST (winter) = UTC-6  → 06:10 UTC
  # CDT (summer) = UTC-5  → 05:10 UTC
  # GitHub Actions cron runs in UTC, so this is set for CST (winter).
  # Update to '10 5 * * *' in March when daylight saving kicks in.
  schedule:
    - cron: '10 6 * * *'
  # Allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hour max (scraping 20 sources takes time)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: cron/requirements.txt

      - name: Install dependencies
        run: |
          cd cron
          pip install -r requirements.txt

      - name: Run ingestion script
        env:
          # ENV VARIABLE MUSH — set these in GitHub repo Settings → Secrets → Actions
          NEWSROOM_API_KEY: ${{ secrets.NEWSROOM_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd cron
          python daily_reader.py

      - name: Trigger clustering workflow
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cluster.yml',
              ref: 'main'
            });