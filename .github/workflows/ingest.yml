name: Daily News Ingestion

on:
  # Runs every day at 7:00 AM UTC (2:00 AM Chicago time)
  schedule:
    - cron: '0 7 * * *'
  # Also allow manual triggering from the GitHub Actions UI
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hour max (scraping 20 sources takes time)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: cron/requirements.txt

      - name: Install dependencies
        run: |
          cd cron
          pip install -r requirements.txt

      - name: Run ingestion script
        env:
          # ENV VARIABLE MUSH — set these in GitHub repo Settings → Secrets → Actions
          NEWSROOM_API_KEY: ${{ secrets.NEWSROOM_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd cron
          python daily_reader.py

      - name: Trigger clustering workflow
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'cluster.yml',
              ref: 'main'
            });